name: Bug report
description: Report a reproducible problem in AI IDE Agent.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Which release, branch, or commit are you using?
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output. Remove secrets before sharing.
